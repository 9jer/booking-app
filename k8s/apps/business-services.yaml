---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: property-uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: property-service
  labels:
    app: property-service
spec:
  selector:
    app: property-service
  ports:
    - name: http
      port: 8080
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: property-service
  template:
    metadata:
      labels:
        app: property-service
    spec:
      containers:
        - name: property-service
          image: 90jer/property-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-postgresql:5432/property_service_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: app-secrets, key: db-username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: db-password } }
            - name: SPRING_DATASOURCE_HIKARI_POOL_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: spring-datasource-hikari-pool-name
            - name: SPRING_DATA_REDIS_HOST
              valueFrom: { configMapKeyRef: { name: app-config, key: redis-host } }
            - name: SPRING_DATA_REDIS_PORT
              valueFrom: { configMapKeyRef: { name: app-config, key: redis-port } }
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom: { configMapKeyRef: { name: app-config, key: kafka-bootstrap-servers } }
            - name: SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL
              valueFrom: { configMapKeyRef: { name: app-config, key: kafka-properties-schema-registry-url } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: app-secrets, key: jwt-secret } }
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: otlp-tracing-endpoint
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "property-service"
          volumeMounts:
            - name: uploads-storage
              mountPath: /uploads
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: property-uploads-pvc


---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-boot-apps
  namespace: observability
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - api-gateway
          - user-service
          - booking-service
          - property-service
          - review-service
          - notification-service
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
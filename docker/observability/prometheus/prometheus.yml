scrape_configs:
  - job_name: 'spring-boot-microservices'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'api-gateway:8080'
          - 'property-service:8081'
          - 'booking-service:8082'
          - 'review-service:8083'
          - 'user-service:8084'
          - 'notification-service:8085'
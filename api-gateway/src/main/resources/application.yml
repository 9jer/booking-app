spring:
  application:
    name: api-gateway

  config:
    import: optional:classpath:secrets.properties

  mvc:
    hiddenmethod:
      filter:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Booking Service
        url: /aggregate/booking-service/v3/api-docs
      - name: Property Service
        url: /aggregate/property-service/v3/api-docs
      - name: Review Service
        url: /aggregate/review-service/v3/api-docs
      - name: User Service
        url: /aggregate/user-service/v3/api-docs
    validator-url: null
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    instance-id: api-gateway-instance-${random.uuid}
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

jwt:
  secret: ${jwt.secret}

server:
  port: 8080
